apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-sa
  namespace: sticky-sessions-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-discovery
  namespace: sticky-sessions-demo
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["list", "watch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-discovery
  namespace: sticky-sessions-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-discovery
subjects:
  - kind: ServiceAccount
    name: gateway-sa
    namespace: sticky-sessions-demo
